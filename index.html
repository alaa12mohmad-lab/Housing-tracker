<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>تتبع إيجارات مساكن الشركة</title>
  <meta name="theme-color" content="#1E3A38">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="login-screen">
    <form id="login-form" class="login-card">
      <h2>تسجيل الدخول</h2>
      <p class="muted small">تتبع إيجارات مساكن الشركة</p>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <p id="login-error" class="login-error"></p>
      <button type="submit" class="btn btn-primary login-btn">دخول</button>
    </form>
  </div>

  <div id="app-shell">
    <div id="side-nav-wrap">
      <div class="brand">
        تتبع إيجارات المساكن
        <small>عيون الحديد · ريان القرني · القيادة الذكية</small>
      </div>
      <nav id="side-nav"></nav>
      <div id="nav-footer">
        <span id="user-email"></span>
        <button class="btn-logout" onclick="logout()">خروج</button>
      </div>
    </div>

    <div id="main-area">
      <div id="top-bar">
        <span id="page-title">الرئيسية</span>
      </div>
      <div id="page-container"></div>
    </div>
  </div>

  <!-- المودال المشترك لكل الصفحات -->
  <div id="modal-overlay">
    <div class="modal-panel">
      <div id="modal-head"></div>
      <div id="modal-box"></div>
      <div id="modal-foot"></div>
    </div>
  </div>

  <div id="toast-box"></div>

  <!-- Firebase (نسخة compat عشان تتوافق مع أسلوب vanilla JS البسيط) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>

  <!-- إعدادات وتهيئة -->
  <script src="js/config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>

  <!-- طبقات مشتركة -->
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>

  <!-- الصفحات -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/residences.js"></script>
  <script src="js/pages/contracts.js"></script>
  <script src="js/pages/payments.js"></script>
  <script src="js/pages/electricity.js"></script>
  <script src="js/pages/water.js"></script>
  <script src="js/pages/expenses.js"></script>

  <!-- الراوتر وبداية التشغيل -->
  <script src="js/router.js"></script>
  <script>
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'modal-overlay') closeModal();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
